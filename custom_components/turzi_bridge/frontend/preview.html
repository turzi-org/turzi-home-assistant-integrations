customElements.define("ha-icon", class extends HTMLElement {
  static get observedAttributes() { return ["icon"]; }
  connectedCallback() { this._update(); }
  attributeChangedCallback() { this._update(); }
  _update() {
    const icon = this.getAttribute("icon") || "";
    const svg = ICON_MAP[icon] || ICON_MAP["mdi:help-circle-outline"];
    this.style.display = "inline-flex";
    this.style.width = "var(--mdc-icon-size, 24px)";
    this.style.height = "var(--mdc-icon-size, 24px)";
    this.style.color = "inherit";
    this.innerHTML = svg;
    const s = this.querySelector("svg");
    if (s) { s.style.width = "100%"; s.style.height = "100%"; }
  }
});

customElements.define("ha-switch", class extends HTMLElement {
  static get observedAttributes() { return ["checked"]; }
  connectedCallback() { if (!this._built) this._build(); }
  attributeChangedCallback() { if (this._built) this._updateState(); }
  _build() {
    this._built = true;
    this.style.display = "inline-block";
    this.style.cursor = "pointer";
    this.innerHTML = `<label style="position:relative;display:inline-block;width:36px;height:20px;cursor:pointer">
      <input type="checkbox" style="opacity:0;width:0;height:0;position:absolute">
      <span class="sl" style="position:absolute;inset:0;border-radius:20px;background:#555;transition:.2s;display:flex;align-items:center">
        <span class="th" style="position:absolute;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.4)"></span>
      </span>
    </label>`;
    this._inp = this.querySelector("input");
    this._sl = this.querySelector(".sl");
    this._th = this.querySelector(".th");
    this._updateState();
    this._inp.addEventListener("change", () => {
      if (this._inp.checked) this.setAttribute("checked", "");
      else this.removeAttribute("checked");
      this._updateState();
      this.dispatchEvent(new Event("change", { bubbles: true }));
    });
  }
  _updateState() {
    const on = this.hasAttribute("checked");
    this._inp.checked = on;
    this._sl.style.background = on ? "#FF8400" : "#555";
    this._th.style.left = on ? "18px" : "2px";
  }
  get checked() { return this.hasAttribute("checked"); }
});
</script>
